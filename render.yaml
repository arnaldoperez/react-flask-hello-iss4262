            fromDatabase:
                name: postgresql-trapezoidal-42170
                property: connectionString
          - key: FLASK_APP_KEY # Imported from Heroku app
            value: ""
          - key: JWT_SECRET
            value: ""
          - key: BACKEND_URL
            value: ""
          - key: FRONTEND_URL
            value: ""
          - key: MAIL_SERVICE_ID
            value: ""
          - key: MAIL_PRIVATE_KEY
            value: ""
          - key: MAIL_TEMPLATE_ID
            value: ""
          - key: MAIL_USER_ID
            value: ""
          - key: MAIL_SEND_URL
            value: ""
          - key: SEED_DATA
            value: ""
          - key: FIREBASE_KEY_FILE
            value: ""

databases: # Render PostgreSQL database
